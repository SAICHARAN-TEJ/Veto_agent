services:
  - type: web
    name: veto-app
    env: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci && npm --prefix server ci && npm run build
    startCommand: npm run server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: HINDSIGHT_API_KEY
        sync: false
      - key: HINDSIGHT_BASE_URL
        value: https://api.hindsight.vectorize.io
      - key: HINDSIGHT_BANK_ID
        value: veto-customer-support
